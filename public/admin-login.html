<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Someshwarnagar Food</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff7a18, #af002d);
      font-family: Arial, sans-serif;
    }

    .admin-login-box {
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 35px;
      border-radius: 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      text-align: center;
    }

    .admin-login-box h1 {
      margin-bottom: 8px;
      color: #222;
    }

    .admin-login-box p {
      color: #666;
      margin-bottom: 25px;
    }

    .admin-login-box input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
    }

    .admin-login-box button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #ff6b00;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .admin-login-box button:hover {
      background: #e85f00;
    }

    #adminMsg {
      margin-top: 15px;
      font-weight: bold;
      color: red;
    }
  </style>
</head>
<body>

  <div class="admin-login-box">
    <h1>Admin Login</h1>
    <p>Someshwarnagar Food Order Panel</p>

    <input type="email" id="adminEmail" placeholder="Enter admin email" />
    <input type="password" id="adminPassword" placeholder="Enter password" />

    <button onclick="adminLogin()">Login</button>

    <div id="adminMsg"></div>
  </div>

  <script>
    function adminLogin() {
      const email = document.getElementById("adminEmail").value.trim();
      const password = document.getElementById("adminPassword").value.trim();
      const msg = document.getElementById("adminMsg");

      if (email === "admin@gmail.com" && password === "Admin@123") {
        localStorage.setItem("adminLoggedIn", "true");
        window.location.href = "/admin.html";
      } else {
        msg.innerText = "Invalid admin email or password";
      }
    }
  </script>

</body>
</html>
